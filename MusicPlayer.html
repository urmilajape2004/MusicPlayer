<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Music Player - Hindi Songs</title>
  <style>
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #1d2671, #c33764);
      color: #fff;
    }
    .player {
      width: 350px;
      background: #222;
      border-radius: 20px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.5);
      padding: 20px;
      text-align: center;
    }
    .song-info {
      margin-bottom: 15px;
    }
    .song-title {
      font-size: 1.2rem;
      font-weight: bold;
    }
    .song-artist {
      font-size: 0.9rem;
      color: #bbb;
    }
    .controls {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 20px;
      margin: 15px 0;
    }
    button {
      background: #444;
      border: none;
      padding: 10px 15px;
      border-radius: 50%;
      color: #fff;
      font-size: 18px;
      cursor: pointer;
      transition: 0.3s;
    }
    button:hover {
      background: #666;
    }
    .progress-container {
      background: #444;
      border-radius: 10px;
      cursor: pointer;
      height: 6px;
      margin: 15px 0;
      width: 100%;
      position: relative;
    }
    .progress {
      background: #ff6347;
      height: 100%;
      width: 0%;
      border-radius: 10px;
    }
    .time {
      display: flex;
      justify-content: space-between;
      font-size: 0.8rem;
      color: #aaa;
    }
    .volume-control {
      margin-top: 15px;
    }
    input[type="range"] {
      width: 100%;
    }
    .playlist {
      margin-top: 15px;
      max-height: 120px;
      overflow-y: auto;
      text-align: left;
    }
    .playlist div {
      padding: 6px 10px;
      border-radius: 6px;
      cursor: pointer;
    }
    .playlist div:hover {
      background: #333;
    }
    .active {
      background: #ff6347;
    }
  </style>
</head>
<body>
  <div class="player">
    <div class="song-info">
      <div class="song-title" id="title">Song Title</div>
      <div class="song-artist" id="artist">Artist</div>
    </div>

    <div class="controls">
      <button id="prev">⏮</button>
      <button id="play">▶️</button>
      <button id="next">⏭</button>
    </div>

    <div class="progress-container" id="progress-container">
      <div class="progress" id="progress"></div>
    </div>
    <div class="time">
      <span id="current-time">0:00</span>
      <span id="duration">0:00</span>
    </div>

    <div class="volume-control">
      Volume: <input type="range" id="volume" min="0" max="1" step="0.01" value="1">
    </div>

    <div class="playlist" id="playlist"></div>
  </div>

  <audio id="audio"></audio>

  <script>
    // 🎵 Hindi songs playlist (public domain / sample links)
    const songs = [
      { title: "Tera Ban Jaunga", artist: "Kabir Singh", src: "https://pagalfree.com/musics/128-Tera%20Ban%20Jaunga%20-%20Kabir%20Singh%20128%20Kbps.mp3" },
      { title: "Shayad", artist: "Love Aaj Kal", src: "https://pagalfree.com/musics/128-Shayad%20-%20Love%20Aaj%20Kal%20128%20Kbps.mp3" },
      { title: "Tum Hi Ho", artist: "Aashiqui 2", src: "https://pagalfree.com/musics/128-Tum%20Hi%20Ho%20-%20Aashiqui%202%20128%20Kbps.mp3" },
      { title: "Raabta", artist: "Agent Vinod", src: "https://pagalfree.com/musics/128-Raabta%20-%20Agent%20Vinod%20128%20Kbps.mp3" },
      { title: "Kabira", artist: "Yeh Jawaani Hai Deewani", src: "https://pagalfree.com/musics/128-Kabira%20-%20Yeh%20Jawaani%20Hai%20Deewani%20128%20Kbps.mp3" }
    ];

    let songIndex = 0;
    const audio = document.getElementById("audio");
    const playBtn = document.getElementById("play");
    const prevBtn = document.getElementById("prev");
    const nextBtn = document.getElementById("next");
    const title = document.getElementById("title");
    const artist = document.getElementById("artist");
    const progressContainer = document.getElementById("progress-container");
    const progress = document.getElementById("progress");
    const currentTimeEl = document.getElementById("current-time");
    const durationEl = document.getElementById("duration");
    const volumeSlider = document.getElementById("volume");
    const playlistEl = document.getElementById("playlist");

    // Load playlist UI
    songs.forEach((song, index) => {
      const div = document.createElement("div");
      div.textContent = `${song.title} - ${song.artist}`;
      div.onclick = () => loadSong(index, true);
      playlistEl.appendChild(div);
    });

    function loadSong(index, play=false) {
      songIndex = index;
      audio.src = songs[songIndex].src;
      title.textContent = songs[songIndex].title;
      artist.textContent = songs[songIndex].artist;

      document.querySelectorAll(".playlist div").forEach((el,i)=>{
        el.classList.toggle("active", i === songIndex);
      });

      if(play) audio.play();
      updatePlayButton();
    }

    function playSong() {
      audio.play();
      updatePlayButton();
    }

    function pauseSong() {
      audio.pause();
      updatePlayButton();
    }

    function updatePlayButton() {
      playBtn.textContent = audio.paused ? "▶️" : "⏸";
    }

    function prevSong() {
      songIndex = (songIndex - 1 + songs.length) % songs.length;
      loadSong(songIndex, true);
    }

    function nextSong() {
      songIndex = (songIndex + 1) % songs.length;
      loadSong(songIndex, true);
    }

    function updateProgress() {
      if(audio.duration) {
        const percent = (audio.currentTime / audio.duration) * 100;
        progress.style.width = percent + "%";

        const mins = Math.floor(audio.currentTime / 60);
        const secs = Math.floor(audio.currentTime % 60).toString().padStart(2,'0');
        currentTimeEl.textContent = `${mins}:${secs}`;

        const dMins = Math.floor(audio.duration / 60);
        const dSecs = Math.floor(audio.duration % 60).toString().padStart(2,'0');
        durationEl.textContent = `${dMins}:${dSecs}`;
      }
    }

    function setProgress(e) {
      const width = this.clientWidth;
      const clickX = e.offsetX;
      const duration = audio.duration;
      audio.currentTime = (clickX / width) * duration;
    }

    // Event listeners
    playBtn.addEventListener("click", () => audio.paused ? playSong() : pauseSong());
    prevBtn.addEventListener("click", prevSong);
    nextBtn.addEventListener("click", nextSong);
    audio.addEventListener("timeupdate", updateProgress);
    progressContainer.addEventListener("click", setProgress);
    audio.addEventListener("ended", nextSong); // autoplay next
    volumeSlider.addEventListener("input", (e)=> audio.volume = e.target.value);

    // Init
    loadSong(songIndex);
  </script>
</body>
</html>
